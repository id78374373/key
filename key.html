<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔑</text></svg>">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>фKey</title>
    <style>body{background-color:#000;color:#ccc;display:flex;flex-direction:column;justify-content:center;align-items:center;height:100vh;margin:0;font-family:monospace;overflow:hidden;}#code-display{font-size:clamp(2.5rem,12vw,5rem);font-weight:bold;color:#fff;display:none;letter-spacing:8px;margin-bottom:30px;text-align:center;}#status-text{font-size:1.2rem;text-align:center;padding:20px;line-height:1.5;max-width:90%;}.btn-update{margin-top:30px;background:#d8b4fe;border:none;color:#000;padding:15px 40px;cursor:pointer;text-transform:uppercase;font-family:inherit;font-weight:900;border-radius:8px;font-size:1.2rem;transition:transform .1s;outline:none;min-width:200px}.btn-update:active{transform:scale(.96);background:#c084fc}</style>
</head>
<body>
    <div id="code-display"></div>
    <div id="status-text">Загрузка...</div>
    <button class="btn-update" id="main-btn">ОБНОВИТЬ</button>
    <script>
        const SHEET_ID = "1Iy3VMeaJCAVw7DocgZRoiCMToCE4Xgog3CZaFr78T6E";
        const SECRET_KEY = window.location.hash.replace('#', ''); 
        async function getHardwareFingerprint() {
            try {
                const screenInfo = screen.width + "x" + screen.height + "x" + (window.devicePixelRatio || 1) + "c" + screen.colorDepth;
                const cores = navigator.hardwareConcurrency || 0;
                const ram = navigator.deviceMemory || 0;
                let renderer = "unknown";
                try {
                    const gl = document.createElement('canvas').getContext('webgl');
                    if(gl) {
                        const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                        renderer = debugInfo ? gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) : "unknown";
                    }
                } catch(e) {}

                let deviceModel = "";
                if (navigator.userAgentData && navigator.userAgentData.getHighEntropyValues) {
                    try {
                        const hints = await navigator.userAgentData.getHighEntropyValues(['model']);
                        if (hints.model) deviceModel = hints.model;
                    } catch(e) {}
                }
                if (!deviceModel) {
                    const ua = navigator.userAgent;
                    const match = ua.match(/\((.*?)\)/); 
                    if (match && match[1]) {
                        let parts = match[1].split(';');
                        parts = parts.filter(p => !p.toLowerCase().includes('linux') && !p.toLowerCase().includes('android') && !p.toLowerCase().includes('os'));
                        deviceModel = parts.join('|').trim();
                    }
                    if (ua.includes('iPhone')) deviceModel += '|iPhone'; 
                }

                let canvasHash = 0;
                try {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    ctx.font = "14px Arial";
                    ctx.fillStyle = "#f60"; ctx.fillRect(125,1,62,20);
                    ctx.fillStyle = "#069"; ctx.fillText(deviceModel, 2, 15);
                    const dataURL = canvas.toDataURL();
                    for (let i = 0; i < dataURL.length; i++) {
                        canvasHash = ((canvasHash << 5) - canvasHash) + dataURL.charCodeAt(i);
                        canvasHash |= 0;
                    }
                } catch(e) {}

                const rawData = [deviceModel, screenInfo, cores, ram, renderer, canvasHash].join('|||');
                const hashBuffer = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(rawData));
                const hashArray = Array.from(new Uint8Array(hashBuffer));
                return hashArray.map(b => b.toString(16).padStart(2, '0')).join('').substring(0, 32);
            } catch (e) { 
                return "fallback_id_fixed_32_chars_v7"; 
            }
        }

       function fetchPayloadJSONP() {
            return new Promise((resolve, reject) => {
                const callbackName = 'googleSheetCallback';
                window[callbackName] = function(data) {
                    try { resolve(data.table.rows[0].c[0].v); } catch (e) { reject("ERR"); }
                    delete window[callbackName];
                };
                const script = document.createElement('script');
                script.src = "https://docs.google.com/spreadsheets/d/" + SHEET_ID + "/gviz/tq?tqx=out:json;responseHandler:" + callbackName;
                script.onerror = () => reject("NET");
                document.body.appendChild(script);
            });
        }

        setTimeout(async () => {
            const status = document.getElementById('status-text');
            const codeDisplay = document.getElementById('code-display');
            const mainBtn = document.getElementById('main-btn');

            try {
                const fingerprint = await getHardwareFingerprint();
                if (!SECRET_KEY || SECRET_KEY.length !== 64) {
                    status.innerHTML = '<span style="font-size: 1.5rem; color:#fff; font-weight:bold;">ID УСТРОЙСТВА:</span><br><span style="font-size: 1.0rem; color:#d8b4fe; font-weight:bold; word-break: break-all;">' + fingerprint + '</span>';
                    mainBtn.innerText = "КОПИРОВАТЬ";
                    mainBtn.onclick = () => {
                        navigator.clipboard.writeText(fingerprint).then(() => {
                            mainBtn.innerText = "ГОТОВО!";
                            setTimeout(() => mainBtn.innerText = "КОПИРОВАТЬ", 1500);
                        });
                    };
                    return;
                }

                status.innerText = "Синхронизация...";
                mainBtn.onclick = () => location.reload();

                const payload = await fetchPayloadJSONP();
                const fpBytes = new TextEncoder().encode(fingerprint);
                const deviceKeyBuffer = await crypto.subtle.digest('SHA-256', fpBytes);
                const deviceKey = new Uint8Array(deviceKeyBuffer);
                const urlKey = new Uint8Array(SECRET_KEY.match(/.{1,2}/g).map(byte => parseInt(byte, 16)));
                const masterKey = new Uint8Array(32);
                for(let i = 0; i < 32; i++) masterKey[i] = urlKey[i] ^ deviceKey[i];
                
                const cryptoKey = await crypto.subtle.importKey("raw", masterKey, {name: "AES-GCM"}, false, ["decrypt"]);
                const [ivB64, cipherB64] = payload.split(':');
                const iv = Uint8Array.from(atob(ivB64), c => c.charCodeAt(0));
                const ciphertext = Uint8Array.from(atob(cipherB64), c => c.charCodeAt(0));
                
                const decrypted = await crypto.subtle.decrypt({name: "AES-GCM", iv: iv}, cryptoKey, ciphertext);
                status.style.display = 'none';
                codeDisplay.innerText = new TextDecoder().decode(decrypted);
                codeDisplay.style.display = 'block';

            } catch (error) {
                status.innerHTML = "<span style='color:#ff4d4d; font-size:1.2rem; font-weight:bold;'>ОШИБКА:</span><br><br><span style='font-size: 0.9rem; color:#ccc; word-break: break-all;'>" + (error.message || error) + "</span>";
            }
        }, 1000);
    </script>
</body>
</html>
